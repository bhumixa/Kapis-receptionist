# Local development reverse proxy. TLS termination and the hardened
# production server block (docs/SYSTEM_ARCHITECTURE.md Section 10.4) are a
# Milestone 10 concern — this is HTTP-only, matching this stage's local
# Docker Compose stack.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Backend API + infra health checks.
    location ~ ^/(api|health) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket-ready (docs/SYSTEM_ARCHITECTURE.md Section 10.3) — no
        # current endpoint uses it; kept so a future one doesn't need a
        # proxy-config change to work.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Angular dev server (its own live-reload socket needs the Upgrade
    # headers too, hence the same map above serving both locations).
    location / {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
