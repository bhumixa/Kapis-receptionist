name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kapis
          POSTGRES_PASSWORD: kapis_test_password
          POSTGRES_DB: kapis_receptionist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kapis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      APP_NAME: 'Kapis Receptionist API'
      CORS_ORIGIN: http://localhost:4200
      LOG_LEVEL: info
      DATABASE_URL: postgresql://kapis:kapis_test_password@localhost:5432/kapis_receptionist_test?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx ng test --no-watch --no-progress --browsers=ChromeHeadless

      - name: Build
        run: npm run build
