<div class="max-w-xl mx-auto px-6 py-16 text-center">
  <h1 class="text-2xl font-bold text-gray-900">Foundation Setup</h1>
  <p class="mt-2 text-gray-600">
    Milestone 1 — Project Foundation. Business features land in later
    milestones.
  </p>

  @if (readiness(); as r) {
    <dl class="mt-8 grid grid-cols-3 gap-4 text-sm">
      <div class="rounded-lg border border-gray-200 p-4">
        <dt class="text-gray-500">API</dt>
        <dd class="mt-1 font-medium" [class.text-green-600]="r.status === 'ok'" [class.text-red-600]="r.status !== 'ok'">
          {{ r.status }}
        </dd>
      </div>
      <div class="rounded-lg border border-gray-200 p-4">
        <dt class="text-gray-500">Database</dt>
        <dd class="mt-1 font-medium" [class.text-green-600]="r.database === 'connected'" [class.text-red-600]="r.database !== 'connected'">
          {{ r.database }}
        </dd>
      </div>
      <div class="rounded-lg border border-gray-200 p-4">
        <dt class="text-gray-500">Redis</dt>
        <dd class="mt-1 font-medium" [class.text-green-600]="r.redis === 'connected'" [class.text-red-600]="r.redis !== 'connected'">
          {{ r.redis }}
        </dd>
      </div>
    </dl>
  } @else if (checkFailed()) {
    <p class="mt-8 text-red-600 text-sm">Could not reach the API.</p>
  } @else {
    <p class="mt-8 text-gray-400 text-sm">Checking API status…</p>
  }
</div>
