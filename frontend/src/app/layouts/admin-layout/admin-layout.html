<div class="min-h-screen flex flex-col bg-slate-950">
  <header class="border-b border-slate-800 bg-slate-900 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-lg font-semibold text-white">Kapis Receptionist</span>
      <span class="rounded-full bg-amber-500/20 px-3 py-1 text-xs font-semibold text-amber-400">
        Platform Admin
      </span>
    </div>
    <div class="flex items-center gap-4">
      @if (currentUser(); as user) {
        <span class="text-sm text-slate-300">{{ user.firstName }} {{ user.lastName }}</span>
      }
      <a routerLink="/app/dashboard" class="text-sm font-medium text-slate-300 hover:text-white">
        Return to my account
      </a>
      <button
        type="button"
        (click)="logout()"
        [disabled]="loggingOut()"
        class="text-sm font-medium text-slate-300 hover:text-white disabled:opacity-50"
      >
        {{ loggingOut() ? 'Logging out...' : 'Log out' }}
      </button>
    </div>
  </header>
  <main class="flex-1 px-6 py-8">
    <router-outlet />
  </main>
</div>
