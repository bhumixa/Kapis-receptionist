# Serves the built Angular SPA with client-side routing fallback. Exercised
# starting Milestone 10 (production hardening) — the infrastructure/docker/
# nginx/ config (docs/SYSTEM_ARCHITECTURE.md Section 10.3) is the reverse
# proxy in front of this in production; in local dev, that same reverse
# proxy talks to the `development` stage's `ng serve` instead.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
